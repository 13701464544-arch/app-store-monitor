name: 定时爬取并部署

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖
        run: npm install

      - name: 运行爬虫
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: npm run crawl

      - name: 列出所有文件（调试用）
        run: |
          echo "当前目录结构："
          ls -la
          echo ""
          echo "public 目录内容："
          if [ -d "public" ]; then
            ls -la public/
          else
            echo "public 目录不存在！"
          fi
          echo ""
          echo "查找所有 data.json 文件："
          find . -name "data.json" -type f 2>/dev/null || echo "未找到 data.json"

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: '更新数据: ${{ github.run_id }}'
